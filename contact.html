    <main>
        <h1>Contact Me</h1>
        <p>Whether you want to discuss supply chain integration, web development, or talk plot mechanics for thriller novels, feel free to reach out.</p>
        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email">

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone">

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" placeholder="Your inquiry..."></textarea>

            <button type="submit">Send Message</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
